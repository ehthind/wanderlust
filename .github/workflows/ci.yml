name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pr-title:
    name: semantic-pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            chore
            ci
            build
            revert

  delivery-gate:
    name: delivery-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Run delivery-gate
        run: corepack pnpm ci:required-check:delivery-gate
      - name: Upload delivery-gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: required-check-delivery-gate
          path: .ci-artifacts/delivery-gate.*
          include-hidden-files: true
          if-no-files-found: error

  observability-contract:
    name: observability-contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Run observability-contract
        run: corepack pnpm ci:required-check:observability-contract
      - name: Upload observability-contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: required-check-observability-contract
          path: .ci-artifacts/observability-contract.*
          include-hidden-files: true
          if-no-files-found: error

  semantic-release:
    name: semantic-release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - delivery-gate
      - observability-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Download delivery-gate artifact
        uses: actions/download-artifact@v4
        with:
          name: required-check-delivery-gate
          path: .release-inputs/required-checks/delivery-gate
      - name: Download observability-contract artifact
        uses: actions/download-artifact@v4
        with:
          name: required-check-observability-contract
          path: .release-inputs/required-checks/observability-contract
      - name: Publish semantic release
        run: corepack pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
